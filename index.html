<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Indovina la Serie</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #fff;
        text-align: center;
        padding: 20px;
    }

    #styleSelector, #gameArea {
        background: #222;
        padding: 20px;
        border-radius: 10px;
        width: 90%;
        max-width: 500px;
        margin: auto;
        margin-top: 20px;
    }

    input {
        padding: 10px;
        font-size: 18px;
        width: 200px;
        text-align: center;
    }

    button {
        padding: 10px 20px;
        font-size: 18px;
        margin-top: 10px;
        cursor: pointer;
        border: none;
        border-radius: 8px;
        background: #4caf50;
        color: white;
    }

    .attempt {
        margin-top: 10px;
        font-size: 22px;
    }
</style>
</head>
<body>

<h1>Indovina la Serie</h1>

<!-- MENU INIZIALE -->
<div id="styleSelector">
    <h2>Scegli lo stile dei simboli</h2>

    <select id="signalStyle">
        <option value="classic">Classico — 🟢 giusto / 🔴 quasi</option>
        <option value="angeldevil">Angioletto & Diavoletto — 😇 giusto / 😈 quasi</option>
        <option value="soft">Soft (cuori) — 💚 giusto / ❤️ quasi</option>
        <option value="emoji">Emoji Power — ⭐ giusto / 🔥 quasi</option>
        <option value="dark">Dark Mode — 💀 giusto / ☠️ quasi</option>
        <option value="minimal">Minimal — ✔️ giusto / ❌ quasi</option>
        <option value="geometric">Geometrico — 🟩 giusto / 🟥 quasi</option>
        <option value="mind">Mind Game — 🧠 giusto / ⚠️ quasi</option>
        <option value="cartoon">Cartoon — 🌟 giusto / 💢 quasi</option>
        <option value="puzzle">Puzzle Mode — 🧩 giusto / 🔻 quasi</option>
    </select>

    <button onclick="startGame()">Inizia</button>
</div>

<!-- AREA DI GIOCO -->
<div id="gameArea" style="display:none;">
    <h2>Inserisci una sequenza di 5 numeri</h2>

    <input type="text" id="guess" maxlength="5" placeholder="Es: 12345">
    <button onclick="checkGuess()">Invia</button>

    <div id="results"></div>
</div>

<script>
let secret = "";
let symbols = { green: "🟢", red: "🔴" };

// GENERA NUMERI CASUALI
function generateSecret() {
    secret = "";
    for (let i = 0; i < 5; i++) {
        secret += Math.floor(Math.random() * 10);
    }
}

// AVVIO GIOCO + SCELTA SIMBOLI
function startGame() {
    const style = document.getElementById("signalStyle").value;

    switch(style) {
        case "classic": symbols.green = "🟢"; symbols.red = "🔴"; break;
        case "angeldevil": symbols.green = "😇"; symbols.red = "😈"; break;
        case "soft": symbols.green = "💚"; symbols.red = "❤️"; break;
        case "emoji": symbols.green = "⭐"; symbols.red = "🔥"; break;
        case "dark": symbols.green = "💀"; symbols.red = "☠️"; break;
        case "minimal": symbols.green = "✔️"; symbols.red = "❌"; break;
        case "geometric": symbols.green = "🟩"; symbols.red = "🟥"; break;
        case "mind": symbols.green = "🧠"; symbols.red = "⚠️"; break;
        case "cartoon": symbols.green = "🌟"; symbols.red = "💢"; break;
        case "puzzle": symbols.green = "🧩"; symbols.red = "🔻"; break;
    }

    document.getElementById("styleSelector").style.display = "none";
    document.getElementById("gameArea").style.display = "block";

    generateSecret();
}

// CONTROLLO TENTATIVO
function checkGuess() {
    const guess = document.getElementById("guess").value;

    if (guess.length !== 5 || isNaN(guess)) {
        alert("Inserisci 5 numeri!");
        return;
    }

    let green = 0;
    let red = 0;

    let secretArr = secret.split("");
    let guessArr = guess.split("");

    // GIUSTO-GIUSTO
    for (let i = 0; i < 5; i++) {
        if (guessArr[i] === secretArr[i]) {
            green++;
            secretArr[i] = guessArr[i] = null;
        }
    }

    // GIUSTO-SBAGLIATO
    for (let i = 0; i < 5; i++) {
        if (guessArr[i] !== null) {
            let index = secretArr.indexOf(guessArr[i]);
            if (index !== -1) {
                red++;
                secretArr[index] = null;
            }
        }
    }

    document.getElementById("results").innerHTML += `
        <div class="attempt">
            <strong>${guess}</strong> → 
            ${symbols.green.repeat(green)}
            ${symbols.red.repeat(red)}
        </div>
    `;

    if (green === 5) {
        document.getElementById("results").innerHTML += `
            <h2>Hai indovinato! 🎉</h2>
        `;
    }
}
</script>

</body>
</html>
