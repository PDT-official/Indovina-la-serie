<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Indovina la Serie</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #fff;
        text-align: center;
        padding: 20px;
    }

    #styleSelector, #gameArea {
        background: #222;
        padding: 20px;
        border-radius: 10px;
        width: 90%;
        max-width: 550px;
        margin: auto;
        margin-top: 20px;
    }

    select, button, input[type="text"] {
        padding: 10px;
        font-size: 18px;
        margin-top: 10px;
        border-radius: 8px;
        border: none;
        width: 100%;
    }

    button {
        background: #4caf50;
        color: white;
        cursor: pointer;
    }

    .digit {
        width: 45px;
        height: 45px;
        font-size: 26px;
        text-align: center;
        margin: 5px;
        border-radius: 6px;
        border: none;
    }

    .attempt {
        margin-top: 12px;
        font-size: 22px;
    }

    /* ------------------ ANIMAZIONI ------------------ */

    /* Fade-in scimmia */
    .fadeIn {
        animation: fadeIn 0.8s ease forwards;
    }
    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.8); }
        to { opacity: 1; transform: scale(1); }
    }

    /* Glow vittoria */
    .winGlow {
        animation: winGlow 1.2s ease-in-out forwards;
    }
    @keyframes winGlow {
        0% { filter: drop-shadow(0 0 0px #00ffea); }
        50% { filter: drop-shadow(0 0 25px #00ffea); }
        100% { filter: drop-shadow(0 0 0px #00ffea); }
    }

    /* Shake errore */
    .shake {
        animation: shake 0.4s ease;
    }
    @keyframes shake {
        0% { transform: translateX(0); }
        25% { transform: translateX(-6px); }
        50% { transform: translateX(6px); }
        75% { transform: translateX(-6px); }
        100% { transform: translateX(0); }
    }

</style>
</head>
<body>

<h1>Indovina la Serie</h1>

<!-- MENU INIZIALE -->
<div id="styleSelector">

    <h2>Inserisci il tuo nome</h2>
    <input type="text" id="playerName" placeholder="Il tuo nome">

    <h2>Scegli lo stile dei simboli</h2>
    <select id="signalStyle">
        <option value="classic">Classico — 🟢 / 🔴</option>
        <option value="angeldevil">😇 / 😈</option>
        <option value="soft">💚 / ❤️</option>
        <option value="emoji">⭐ / 🔥</option>
        <option value="dark">💀 / ☠️</option>
        <option value="minimal">✔️ / ❌</option>
        <option value="geometric">🟩 / 🟥</option>
        <option value="mind">🧠 / ⚠️</option>
        <option value="cartoon">🌟 / 💢</option>
        <option value="puzzle">🧩 / 🔻</option>
    </select>

    <h2>Scegli il livello</h2>
    <select id="gameLevel">
        <option value="rookie">Rookie — 10 tentativi</option>
        <option value="semipro">Semi‑Pro — 8 tentativi</option>
        <option value="pro">Pro — 6 tentativi</option>
    </select>

    <button onclick="startGame()">Inizia</button>

    <div id="ranking"></div>
</div>

<!-- AREA DI GIOCO -->
<div id="gameArea" style="display:none;">
    <h2>Inserisci la sequenza di 5 numeri</h2>

    <div id="inputBoxes">
        <input class="digit" maxlength="1">
        <input class="digit" maxlength="1">
        <input class="digit" maxlength="1">
        <input class="digit" maxlength="1">
        <input class="digit" maxlength="1">
    </div>

    <button onclick="sendBoxes()">Invia</button>

    <div id="results"></div>
</div>

<script>
let secret = "";
let symbols = { green: "🟢", red: "🔴" };
let attempts = 0;
let maxAttempts = 8;

let player = "";
let bestAttempts = null;
let bestLevel = null;
let bestPlayer = "";

function loadRanking() {
    const saved = localStorage.getItem("indovina_best");
    if (saved) {
        const data = JSON.parse(saved);
        bestAttempts = data.bestAttempts;
        bestLevel = data.bestLevel;
        bestPlayer = data.bestPlayer;
    }
    updateRankingView();
}

function updateRankingView() {
    const r = document.getElementById("ranking");
    if (bestAttempts === null) {
        r.textContent = "Nessun record ancora registrato.";
    } else {
        r.textContent = "Miglior risultato: " + bestAttempts + " tentativi (" + bestLevel + ") — di " + bestPlayer;
    }
}

function generateSecret() {
    secret = "";
    for (let i = 0; i < 5; i++) {
        secret += Math.floor(Math.random() * 10);
    }
}

function startGame() {
    player = document.getElementById("playerName").value.trim();
    if (player === "") player = "Giocatore";

    const style = document.getElementById("signalStyle").value;
    const level = document.getElementById("gameLevel").value;

    switch(style) {
        case "classic": symbols.green = "🟢"; symbols.red = "🔴"; break;
        case "angeldevil": symbols.green = "😇"; symbols.red = "😈"; break;
        case "soft": symbols.green = "💚"; symbols.red = "❤️"; break;
        case "emoji": symbols.green = "⭐"; symbols.red = "🔥"; break;
        case "dark": symbols.green = "💀"; symbols.red = "☠️"; break;
        case "minimal": symbols.green = "✔️"; symbols.red = "❌"; break;
        case "geometric": symbols.green = "🟩"; symbols.red = "🟥"; break;
        case "mind": symbols.green = "🧠"; symbols.red = "⚠️"; break;
        case "cartoon": symbols.green = "🌟"; symbols.red = "💢"; break;
        case "puzzle": symbols.green = "🧩"; symbols.red = "🔻"; break;
    }

    if (level === "rookie") maxAttempts = 10;
    if (level === "semipro") maxAttempts = 8;
    if (level === "pro") maxAttempts = 6;

    attempts = 0;
    document.getElementById("results").innerHTML = `<p>Giocatore: <strong>${player}</strong></p>`;

    document.getElementById("styleSelector").style.display = "none";
    document.getElementById("gameArea").style.display = "block";

    generateSecret();
}

function sendBoxes() {
    const boxes = document.querySelectorAll(".digit");
    let guess = "";

    boxes.forEach(b => guess += b.value);

    checkGuess(guess);

    boxes.forEach(b => b.value = "");
}

function checkGuess(guess) {

    if (attempts >= maxAttempts) return;

    if (guess.length !== 5 || isNaN(guess)) {
        alert("Inserisci 5 numeri validi!");
        return;
    }

    attempts++;

    let green = 0;
    let red = 0;

    let secretArr = secret.split("");
    let guessArr = guess.split("");

    for (let i = 0; i < 5; i++) {
        if (guessArr[i] === secretArr[i]) {
            green++;
            secretArr[i] = guessArr[i] = null;
        }
    }

    for (let i = 0; i < 5; i++) {
        if (guessArr[i] !== null) {
            let index = secretArr.indexOf(guessArr[i]);
            if (index !== -1) {
                red++;
                secretArr[index] = null;
            }
        }
    }

    document.getElementById("results").innerHTML += `
        <div class="attempt">
            <strong>${guess}</strong> →
            ${symbols.green.repeat(green)}
            ${symbols.red.repeat(red)}
            <span style="font-size:14px; opacity:0.7;"> (${attempts}/${maxAttempts})</span>
        </div>
    `;

    /* SHAKE se sbagli */
    if (green !== 5 && attempts < maxAttempts) {
        document.getElementById("results").classList.add("shake");
        setTimeout(() => {
            document.getElementById("results").classList.remove("shake");
        }, 400);
    }

    /* VITTORIA */
    if (green === 5) {
        document.getElementById("results").innerHTML += `
            <h2>Hai indovinato! 🎉</h2>
            <div class="winGlow" style="margin-top:10px;">
                <img src="fireworks.jpg" style="width:200px; border-radius:10px;">
            </div>
            <p style="opacity:0.7;">Grande ${player}!</p>

            <button onclick="resetGame()" style="
                margin-top:20px;
                padding:10px 20px;
                font-size:18px;
                border:none;
                border-radius:8px;
                background:#ff9800;
                color:#000;
                cursor:pointer;
            ">Ricomincia</button>
        `;

        if (bestAttempts === null || attempts < bestAttempts) {
            const levelText = document.getElementById("gameLevel").selectedOptions[0].textContent;
            bestAttempts = attempts;
            bestLevel = levelText;
            bestPlayer = player;

            localStorage.setItem("indovina_best", JSON.stringify({
                bestAttempts,
                bestLevel,
                bestPlayer
            }));

            updateRankingView();
        }
        return;
    }

    /* SCONFITTA */
    if (attempts >= maxAttempts) {
        document.getElementById("results").innerHTML += `
            <h2>Hai finito i tentativi 😵</h2>
            <p>La serie era: <strong>${secret}</strong></p>
            <div class="fadeIn" style="margin-top:10px;">
                <img src="monkey.jpg" style="width:160px; border-radius:10px;">
            </div>
            <p style="opacity:0.7;">Ritenta ${player}, la scimmia ti guarda così…</p>

            <button onclick="resetGame()" style="
                margin-top:20px;
                padding:10px 20px;
                font-size:18px;
                border:none;
                border-radius:8px;
                background:#ff9800;
                color:#000;
                cursor:pointer;
            ">Ricomincia</button>
        `;
    }
}

function resetGame() {
    document.getElementById("gameArea").style.display = "none";
    document.getElementById("styleSelector").style.display = "block";
    document.getElementById("results").innerHTML = "";
}

loadRanking();
</script>

<p style="opacity:0.5; font-size:12px; margin-top:40px;">
    MLance26
</p>

</body>
</html>
