<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Indovina la Serie</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #111;
        color: #fff;
        text-align: center;
        padding: 20px;
    }

    #styleSelector, #gameArea {
        background: #222;
        padding: 20px;
        border-radius: 10px;
        width: 90%;
        max-width: 550px;
        margin: auto;
        margin-top: 20px;
    }

    select, button {
        padding: 10px;
        font-size: 18px;
        margin-top: 10px;
        border-radius: 8px;
        border: none;
    }

    button {
        background: #4caf50;
        color: white;
        cursor: pointer;
    }

    #inputBoxes {
        margin-top: 20px;
    }

    .digit {
        width: 45px;
        height: 45px;
        font-size: 26px;
        text-align: center;
        margin: 5px;
        border-radius: 6px;
        border: none;
    }

    .attempt {
        margin-top: 12px;
        font-size: 22px;
    }
</style>
</head>
<body>

<h1>Indovina la Serie</h1>

<!-- MENU INIZIALE -->
<div id="styleSelector">
    <h2>Scegli lo stile dei simboli</h2>

    <select id="signalStyle">
        <option value="classic">Classico — 🟢 numero giusto in posizione giusta / 🔴 numero giusto in posizione sbagliata</option>
        <option value="angeldevil">Angioletto & Diavoletto — 😇 giusto in posizione giusta / 😈 giusto in posizione sbagliata</option>
        <option value="soft">Soft (cuori) — 💚 giusto in posizione giusta / ❤️ giusto in posizione sbagliata</option>
        <option value="emoji">Emoji Power — ⭐ giusto in posizione giusta / 🔥 giusto in posizione sbagliata</option>
        <option value="dark">Dark Mode — 💀 giusto in posizione giusta / ☠️ giusto in posizione sbagliata</option>
        <option value="minimal">Minimal — ✔️ giusto in posizione giusta / ❌ giusto in posizione sbagliata</option>
        <option value="geometric">Geometrico — 🟩 giusto in posizione giusta / 🟥 giusto in posizione sbagliata</option>
        <option value="mind">Mind Game — 🧠 giusto in posizione giusta / ⚠️ giusto in posizione sbagliata</option>
        <option value="cartoon">Cartoon — 🌟 giusto in posizione giusta / 💢 giusto in posizione sbagliata</option>
        <option value="puzzle">Puzzle Mode — 🧩 giusto in posizione giusta / 🔻 giusto in posizione sbagliata</option>
    </select>

    <h2>Scegli il livello</h2>
    <select id="gameLevel">
        <option value="rookie">Rookie — 10 tentativi</option>
        <option value="semipro">Semi‑Pro — 8 tentativi</option>
        <option value="pro">Pro — 6 tentativi</option>
    </select>

    <button onclick="startGame()">Inizia</button>
</div>

<!-- AREA DI GIOCO -->
<div id="gameArea" style="display:none;">
    <h2>Inserisci la sequenza di 5 numeri</h2>

    <div id="inputBoxes">
        <input class="digit" maxlength="1">
        <input class="digit" maxlength="1">
        <input class="digit" maxlength="1">
        <input class="digit" maxlength="1">
        <input class="digit" maxlength="1">
    </div>

    <button onclick="sendBoxes()">Invia</button>

    <div id="results"></div>
</div>

<script>
let secret = "";
let symbols = { green: "🟢", red: "🔴" };
let attempts = 0;
let maxAttempts = 8;

// GENERA NUMERO SEGRETO
function generateSecret() {
    secret = "";
    for (let i = 0; i < 5; i++) {
        secret += Math.floor(Math.random() * 10);
    }
}

// AVVIO GIOCO
function startGame() {
    const style = document.getElementById("signalStyle").value;
    const level = document.getElementById("gameLevel").value;

    // IMPOSTA SIMBOLI
    switch(style) {
        case "classic": symbols.green = "🟢"; symbols.red = "🔴"; break;
        case "angeldevil": symbols.green = "😇"; symbols.red = "😈"; break;
        case "soft": symbols.green = "💚"; symbols.red = "❤️"; break;
        case "emoji": symbols.green = "⭐"; symbols.red = "🔥"; break;
        case "dark": symbols.green = "💀"; symbols.red = "☠️"; break;
        case "minimal": symbols.green = "✔️"; symbols.red = "❌"; break;
        case "geometric": symbols.green = "🟩"; symbols.red = "🟥"; break;
        case "mind": symbols.green = "🧠"; symbols.red = "⚠️"; break;
        case "cartoon": symbols.green = "🌟"; symbols.red = "💢"; break;
        case "puzzle": symbols.green = "🧩"; symbols.red = "🔻"; break;
    }

    // IMPOSTA LIVELLO
    if (level === "rookie") maxAttempts = 10;
    if (level === "semipro") maxAttempts = 8;
    if (level === "pro") maxAttempts = 6;

    attempts = 0;
    document.getElementById("results").innerHTML = "";

    document.getElementById("styleSelector").style.display = "none";
    document.getElementById("gameArea").style.display = "block";

    generateSecret();
}

// RACCOGLIE LE 5 CASELLE
function sendBoxes() {
    const boxes = document.querySelectorAll(".digit");
    let guess = "";

    boxes.forEach(b => guess += b.value);

    checkGuess(guess);
}

// CONTROLLO TENTATIVO
function checkGuess(guess) {

    if (attempts >= maxAttempts) {
        alert("Hai già usato tutti i tentativi!");
        return;
    }

    if (guess.length !== 5 || isNaN(guess)) {
        alert("Inserisci 5 numeri validi!");
        return;
    }

    attempts++;

    let green = 0;
    let red = 0;

    let secretArr = secret.split("");
    let guessArr = guess.split("");

    // GIUSTO-GIUSTO
    for (let i = 0; i < 5; i++) {
        if (guessArr[i] === secretArr[i]) {
            green++;
            secretArr[i] = guessArr[i] = null;
        }
    }

    // GIUSTO-SBAGLIATO
    for (let i = 0; i < 5; i++) {
        if (guessArr[i] !== null) {
            let index = secretArr.indexOf(guessArr[i]);
            if (index !== -1) {
                red++;
                secretArr[index] = null;
            }
        }
    }

    document.getElementById("results").innerHTML += `
        <div class="attempt">
            <strong>${guess}</strong> →
            ${symbols.green.repeat(green)}
            ${symbols.red.repeat(red)}
            <span style="font-size:14px; opacity:0.7;"> (${attempts}/${maxAttempts})</span>
        </div>
    `;

    if (green === 5) {
        document.getElementById("results").innerHTML += `<h2>Hai indovinato! 🎉</h2>`;
        return;
    }

    if (attempts >= maxAttempts) {
        document.getElementById("results").innerHTML += `
            <h2>Hai finito i tentativi 😵<br>La serie era: ${secret}</h2>
        `;
    }
}
</script>

</body>
</html>
